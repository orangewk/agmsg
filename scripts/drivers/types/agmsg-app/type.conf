# agmsg agent-type manifest — read-only key=value DATA. NEVER sourced.
#
# agmsg-app: the app-user identity used by the agmsg desktop app. It represents
# the human at the app, not a spawnable CLI agent — the app owns its own
# send/receive UI, so there is no PTY to launch and no agmsg-side delivery.
name=agmsg-app
spawnable=no
monitor=no
delivery_modes=off
