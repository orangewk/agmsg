# agmsg agent-type manifest — read-only key=value DATA. NEVER sourced.
name=antigravity
template=template.md
cli=agy
spawnable=yes
# antigravity invokes a skill with "$", not Claude Code's "/" (see spawn.sh, #283).
cmd_prefix=$
model_arg=--model
prompt_arg=--prompt-interactive
detect=explicit
hooks_file=.agent/rules/agmsg.md
monitor=no
delivery_modes=turn off
